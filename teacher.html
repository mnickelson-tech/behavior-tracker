<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavior Tracker — Teacher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Behavior Tracker — Teacher</h1>
      <p class="sub">Tap a behavior to log a timestamp.</p>
    </header>

    <!-- 🔐 Login bar -->
    <div class="card" style="margin-bottom:14px;">
      <div class="row" style="justify-content:space-between;">
        <div>
          <strong id="userLabel">Not signed in</strong><br />
          <span class="muted" id="userRoleLabel">Role: —</span>
        </div>
        <div class="row">
          <button class="btn btn-blue" id="loginBtn">Sign in</button>
          <button class="btn btn-gray" id="logoutBtn" style="display:none;">Sign out</button>
        </div>
      </div>
    </div>

    <main class="main">
      <section class="card">
        <h2>Select Student</h2>

        <!-- ✅ Grade tabs -->
        <div id="gradeTabs" class="grade-tabs"></div>

        <div id="studentButtons" class="student-buttons"></div>

        <div class="row">
          <input
            id="studentInput"
            class="input"
            type="text"
            placeholder="Add student (first last name)…"
          />
          <button id="addStudentBtn" class="btn btn-green">Add</button>
        </div>

        <div id="currentStudentBox" class="current-student" style="display:none;">
          Tracking: <span id="currentStudentName"></span>
        </div>

        <div id="noStudentWarning" class="warning" style="display:none;">
          Please select a student to begin.
        </div>
      </section>

      <section class="card">
        <h2>Track Behaviors</h2>
        <div id="behaviorGrid" class="behavior-grid"></div>
      </section>

      <section class="card">
        <h2>Today’s Log</h2>
        <div id="todayLog" class="log-list"></div>
      </section>
      <section class="card">
        <h2>Export Data</h2>
        <div class="row" style="flex-wrap: wrap; gap: 10px; align-items: flex-end;">
          <div>
            <div class="muted" style="margin-bottom: 6px;">Student</div>
            <select id="exportStudentFilter" class="input" style="min-width: 200px;">
              <option value="">All students</option>
            </select>
          </div>

          <div>
            <div class="muted" style="margin-bottom: 6px;">Start Date</div>
            <input id="exportStartDate" class="input" type="date" />
          </div>

          <div>
            <div class="muted" style="margin-bottom: 6px;">End Date</div>
            <input id="exportEndDate" class="input" type="date" />
          </div>

          <button id="exportBtn" class="btn btn-green">Export to CSV</button>
        </div>
      </section>    </main>
  </div>
  <!-- 📝 Notes Modal -->
  <div id="notesModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3 id="notesModalTitle">Add Notes</h3>
      <textarea
        id="notesInput"
        class="input notes-textarea"
        placeholder="Optional notes (e.g., what triggered this, context)…"
        rows="4"
      ></textarea>
      <div class="row" style="justify-content:flex-end; margin-top:12px; gap:8px;">
        <button class="btn btn-gray" id="notesCancelBtn">Cancel</button>
        <button class="btn btn-blue" id="notesSaveBtn">Save & Log</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/teacher.js"></script>
</body>
</html>
